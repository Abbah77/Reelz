version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  video_player: ^2.8.0
  dio: ^5.3.0
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.1
  drift: ^2.12.0
