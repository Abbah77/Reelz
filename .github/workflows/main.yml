name: Generate .g.dart Files

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter SDK
        uses: actions/cache@v3
        with:
          path: /tmp/flutter
          key: flutter-stable-${{ runner.os }}
      
      - name: Install Flutter manually
        run: |
          if [ ! -d "/tmp/flutter" ]; then
            cd /tmp
            git clone https://github.com/flutter/flutter.git --depth 1 -b stable flutter
          fi
          echo "/tmp/flutter/bin" >> $GITHUB_PATH
      
      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.yaml') }}
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Push generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Generated code files"
          git push
